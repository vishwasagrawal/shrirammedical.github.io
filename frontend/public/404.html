<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Shri Ram Medical Mandla</title>
  <script>
    // SPA redirect for GitHub Pages — encodes the path into a query string
    // so GitHub serves index.html, which then restores the original URL.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
      l.pathname.slice(1).split('/').join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
