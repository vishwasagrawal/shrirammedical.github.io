<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/medstore-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Shri Ram Medical Mandla - Medical Store Management System" />
    <title>Shri Ram Medical Mandla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Restore path encoded by 404.html for GitHub Pages SPA routing -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replaceAll('~and~', '&');
          }).join('?');
          globalThis.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(globalThis.location));
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
