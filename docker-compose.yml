version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medstore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medical_store_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: medstore_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medstore_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:medstore_password_2024@postgres:5432/medical_store_db
      JWT_SECRET: change-this-to-a-secure-random-secret-at-least-32-chars
      JWT_REFRESH_SECRET: change-this-refresh-secret-at-least-32-chars
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: medstore_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  backend_uploads:
  backend_logs:
