name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Job 1: Build and deploy React frontend to GitHub Pages ────────────────
  deploy-frontend:
    name: Frontend → GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Job 2: Trigger Render backend redeploy ────────────────────────────────
  deploy-backend:
    name: Backend → Render
    runs-on: ubuntu-latest
    # Runs in parallel with the frontend job

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "$RENDER_HOOK" ]; then
            curl -sf -X POST "$RENDER_HOOK"
            echo "Render deploy triggered successfully"
          else
            echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping backend deploy"
          fi
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
